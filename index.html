<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>qbowl-gen</title>
    <!-- KaTeX for math rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" crossorigin="anonymous">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js" crossorigin="anonymous"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js" crossorigin="anonymous"></script>
    <!-- marked for markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
    <style>
        :root {
            --bg:        #fafaf9;
            --panel:     #ffffff;
            --ink:       #1a1a1a;
            --ink-2:     #525252;
            --ink-3:     #a1a1a1;
            --rule:      #e5e5e5;
            --rule-soft: #f1f1ef;
            --accent:    #1a1a1a;
            --good:      #15803d;
            --bad:       #b91c1c;
            --warn:      #b45309;
            --good-bg:   #f0fdf4;
            --warn-bg:   #fffbeb;
            --bad-bg:    #fef2f2;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        * {
            scrollbar-width: thin;
            scrollbar-color: #d4d4d4 transparent;
        }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d4d4d4; border-radius: 3px; }

        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, system-ui, "Segoe UI", Helvetica, Arial, sans-serif;
            font-size: 14px;
            line-height: 1.5;
            font-feature-settings: "tnum" 1;
            background: var(--bg);
            color: var(--ink);
            -webkit-font-smoothing: antialiased;
        }
        body {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        button, input { font-family: inherit; font-size: inherit; color: inherit; }

        /* ── Header ─────────────────────────────────────────── */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 24px;
            border-bottom: 1px solid var(--rule);
            flex-shrink: 0;
        }
        .brand {
            font-weight: 600;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .brand-dot {
            display: inline-block;
            width: 7px; height: 7px;
            background: var(--ink-3);
            border-radius: 50%;
        }
        .brand-dot.live { background: var(--good); }  /* same green as 'correct' */
        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
            color: var(--ink-2);
            font-size: 13px;
        }
        /* Top-right "you" — clickable to rename */
        .me-name {
            color: var(--ink);
            cursor: text;
            padding: 2px 8px;
            border-radius: 4px;
        }
        .me-name:hover { background: var(--rule-soft); }
        .me-input {
            background: transparent;
            border: 1px solid var(--rule);
            padding: 1px 6px;
            border-radius: 4px;
            width: 110px;
            font: inherit;
            color: var(--ink);
            outline: none;
        }
        .me-input:focus { border-color: var(--ink-2); }
        .reset {
            color: var(--ink-3);
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 6px;
        }
        .reset:hover { color: var(--ink); background: var(--rule-soft); }

        /* ── Layout ─────────────────────────────────────────── */
        .layout {
            flex: 1;
            display: grid;
            grid-template-columns: minmax(0, 1fr) 280px;
            overflow: hidden;
            max-width: 1180px;
            width: 100%;
            margin: 0 auto;
        }

        /* ── Main column ────────────────────────────────────── */
        main {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-right: 1px solid var(--rule);
        }

        /* Topic row */
        .topic-row {
            display: flex;
            gap: 8px;
            align-items: center;
            padding: 16px 24px;
            border-bottom: 1px solid var(--rule);
            flex-shrink: 0;
        }
        .topic-row .label {
            font-size: 13px;
            color: var(--ink-3);
            margin-right: 4px;
        }
        .input {
            background: var(--panel);
            border: 1px solid var(--rule);
            color: var(--ink);
            padding: 8px 12px;
            border-radius: 6px;
            outline: none;
            min-width: 0;
        }
        .input:focus { border-color: var(--ink-2); }
        .input::placeholder { color: var(--ink-3); }
        .input.flex { flex: 1; }

        .btn {
            background: var(--panel);
            border: 1px solid var(--rule);
            color: var(--ink);
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
        }
        .btn:hover { background: var(--rule-soft); }
        .btn-primary {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }
        .btn-primary:hover { background: #000; }

        /* Stream — vertical list of question cards.
           Active card sits at the top; past cards collapse beneath. */
        .stream {
            flex: 1;
            overflow-y: auto;
            padding: 18px 24px;
        }
        .stream-empty {
            color: var(--ink-3);
            text-align: center;
            padding: 64px 20px;
            font-size: 14px;
        }

        .qcard {
            background: var(--panel);
            border: 1px solid var(--rule);
            border-radius: 6px;
            padding: 14px 18px;
            margin-bottom: 10px;
        }
        /* No bg change on lock — the small state label is enough */
        .qcard[data-state="revealed"] { background: var(--good-bg); }
        .qcard[data-state="dead"]     { background: var(--warn-bg); }

        .qhead {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: var(--ink-3);
            margin-bottom: 8px;
        }
        .qhead .qnum { color: var(--ink-2); }
        .qstate.reading  { color: var(--ink-2); }
        .qstate.locked   { color: var(--bad); }
        .qstate.revealed { color: var(--good); }
        .qstate.dead     { color: var(--warn); }

        .qbody {
            font-size: 16px;
            line-height: 1.65;
            color: var(--ink);
        }
        .word-read   { color: var(--ink); }
        .word-unread { color: var(--ink-3); }

        .qresult {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid var(--rule);
            display: flex;
            align-items: baseline;
            gap: 10px;
            flex-wrap: wrap;
            font-size: 13px;
            color: var(--ink-2);
        }
        .qresult .answer {
            color: var(--ink);
            font-weight: 600;
        }
        .qresult .meta {
            margin-left: auto;
            color: var(--ink-2);
        }

        /* Cards in revealed/dead state are click-to-toggle */
        .qcard[data-state="revealed"],
        .qcard[data-state="dead"] { cursor: pointer; }

        /* Collapsed past-question card: a single compact line */
        .qcard.collapsed {
            padding: 8px 14px;
            margin-bottom: 6px;
        }
        .qcard.collapsed .qhead,
        .qcard.collapsed .qbody,
        .qcard.collapsed .qresult { display: none; }
        .qcard.collapsed .qsummary {
            display: flex;
            align-items: baseline;
            gap: 10px;
            font-size: 13px;
            color: var(--ink-2);
        }
        .qcard.collapsed .qsummary .answer {
            color: var(--ink);
            font-weight: 600;
        }
        .qcard.collapsed .qsummary .meta {
            margin-left: auto;
            color: var(--ink-3);
            font-size: 12px;
        }
        .qcard:not(.collapsed) .qsummary { display: none; }

        /* Action strip — minimal, pinned at the bottom */
        .action {
            flex-shrink: 0;
            padding: 12px 24px 16px;
            border-top: 1px solid var(--rule);
            min-height: 56px;
        }
        .action-line {
            display: flex;
            gap: 10px;
            align-items: center;
            min-height: 36px;
        }
        .hint {
            color: var(--ink-2);
            font-size: 13px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            user-select: none;
            padding: 6px 0;
        }
        .hint:hover { color: var(--ink); }
        .hint .key {
            font-size: 11px;
            font-weight: 500;
            padding: 2px 7px;
            border-radius: 4px;
            background: var(--panel);
            border: 1px solid var(--rule);
            color: var(--ink);
            min-width: 22px;
            text-align: center;
        }
        .hint:hover .key { background: var(--rule-soft); }
        .hint.muted { cursor: default; color: var(--ink-3); }
        .hint.muted:hover { color: var(--ink-3); }
        .hint.muted .key { color: var(--ink-3); }

        .timer {
            margin-top: 10px;
            height: 2px;
            background: var(--rule-soft);
            border-radius: 1px;
            overflow: hidden;
        }
        .timer-fill {
            height: 100%;
            width: 0%;
            background: var(--warn);
            transition: width 100ms linear;
        }

        .answer-input { flex: 1; }

        /* ── Sidebar ────────────────────────────────────────── */
        aside {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .panel {
            padding: 18px 22px;
            border-bottom: 1px solid var(--rule);
        }
        .panel:last-child {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-bottom: none;
        }
        .panel-title {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            font-size: 12px;
            color: var(--ink-3);
            margin-bottom: 12px;
        }

        .players-list { display: flex; flex-direction: column; gap: 4px; }
        .player-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 13px;
            padding: 2px 0;
        }
        .player-row .name { color: var(--ink); }
        .player-row .name.me { font-weight: 600; }
        .player-row .score { color: var(--ink-2); font-weight: 500; }
        .player-row .score.pos { color: var(--good); }
        .player-row .score.neg { color: var(--bad); }

        .activity-list {
            flex: 1;
            overflow-y: auto;
            margin: 0 -22px;
            padding: 0 22px;
            font-size: 13px;
        }
        .ev {
            padding: 6px 0;
            color: var(--ink-2);
            border-bottom: 1px solid var(--rule-soft);
        }
        .ev:last-child { border-bottom: none; }
        .ev .who { color: var(--ink); }
        .ev.correct .who { color: var(--good); }
        .ev.wrong .who   { color: var(--warn); }
        .ev.dead .who    { color: var(--warn); }
        .ev.lock .who    { color: var(--bad); }
        .ev.join .who    { color: var(--ink-2); }

        .hidden { display: none !important; }

        @media (max-width: 880px) {
            .layout { grid-template-columns: 1fr; }
            aside { display: none; }
        }
    </style>
</head>
<body>

<header>
    <span class="brand">qbowl<span class="brand-dot" id="conn-dot"></span>gen</span>
    <div class="header-right">
        <span><span id="online-count">1</span> online</span>
        <span class="me-name" id="me-id">…</span>
        <input class="me-input hidden" id="me-edit" type="text" maxlength="24">
        <button class="reset" id="reset-btn">reset</button>
    </div>
</header>

<div class="layout">
    <main>
        <div class="topic-row">
            <span class="label">Topic</span>
            <input id="topic-input" class="input flex" type="text"
                   placeholder="ancient rome, jazz, linear algebra…">
            <button id="start-btn" class="btn btn-primary">Start round</button>
        </div>

        <div class="stream" id="stream">
            <div class="stream-empty" id="stream-empty">
                Type a topic and start a round.
            </div>
        </div>

        <div class="action">
            <div class="action-line" id="action-line">
                <span class="hint muted" id="hint-idle">
                    type a topic above to begin
                </span>
                <span class="hint" id="hint-buzz">
                    <span class="key">space</span>
                    buzz in
                </span>
                <span class="hint muted" id="hint-waiting"></span>
                <input id="answer-input" type="text" class="input answer-input hidden"
                       placeholder="type your answer…" autocomplete="off">
                <span class="hint" id="hint-next">
                    <span class="key">N</span>
                    next question
                </span>
                <span class="hint muted" id="hint-loading">
                    <span class="key">…</span>
                    preparing
                </span>
            </div>
            <div class="timer hidden" id="timer">
                <div class="timer-fill" id="timer-fill"></div>
            </div>
        </div>
    </main>

    <aside>
        <div class="panel">
            <div class="panel-title">
                <span>Players</span>
                <span id="players-count">0</span>
            </div>
            <div class="players-list" id="players-list"></div>
        </div>
        <div class="panel">
            <div class="panel-title"><span>Activity</span></div>
            <div class="activity-list" id="activity"></div>
        </div>
    </aside>
</div>

<script>
"use strict";

// If the page is served from your GitHub Pages URL, talk to the VPS API; otherwise same-origin (local dev).
const PAGES_ORIGIN = "https://zaforf.github.io";
const PAGES_PATH_PREFIX = "/qbowl-gen";
const REMOTE_API_ORIGIN = "https://qbowl-gen.duckdns.org";

function resolveApiBase() {
    if (location.origin === PAGES_ORIGIN && location.pathname.startsWith(PAGES_PATH_PREFIX)) {
        return REMOTE_API_ORIGIN;
    }
    return `${location.protocol}//${location.host}`;
}
const API_BASE_URL = resolveApiBase();

// ── State ────────────────────────────────────────────────────────
// Mirror server phase. Source of truth = server messages.
let state = 'idle';            // idle | loading | reading | locked | revealed
let isBuzzer = false;
let timerInterval = null;
let currentCard = null;
let currentBody = null;
let currentWordsRead = 0;
let streamedWords = [];   // full word list for current question (for re-render)
let currentQNum = 0;
const players = new Map();

let clientId = (() => {
    let id = localStorage.getItem('qb_cid');
    if (!id) {
        id = 'p_' + Math.random().toString(36).slice(2, 7);
        localStorage.setItem('qb_cid', id);
    }
    return id;
})();

const $ = id => document.getElementById(id);
const els = {
    me: $('me-id'),
    meEdit: $('me-edit'),
    onlineCount: $('online-count'),
    connDot: $('conn-dot'),
    topic: $('topic-input'),
    startBtn: $('start-btn'),
    stream: $('stream'),
    streamEmpty: $('stream-empty'),
    answer: $('answer-input'),
    hintIdle: $('hint-idle'),
    hintBuzz: $('hint-buzz'),
    hintWaiting: $('hint-waiting'),
    hintNext: $('hint-next'),
    hintLoading: $('hint-loading'),
    timer: $('timer'),
    timerFill: $('timer-fill'),
    playersList: $('players-list'),
    playersCount: $('players-count'),
    activity: $('activity'),
    resetBtn: $('reset-btn'),
};
els.me.textContent = clientId;

// ── Action zone ──────────────────────────────────────────────────
// Modes are mutually exclusive. The timer is controlled INDEPENDENTLY
// (by showTimer/hideTimer) because it appears in multiple modes.
function action(mode, opts = {}) {
    [els.hintIdle, els.hintBuzz, els.hintWaiting,
     els.answer, els.hintNext, els.hintLoading].forEach(e => e.classList.add('hidden'));

    if (mode === 'idle')    els.hintIdle.classList.remove('hidden');
    if (mode === 'reading') els.hintBuzz.classList.remove('hidden');
    if (mode === 'next')    els.hintNext.classList.remove('hidden');
    if (mode === 'loading') els.hintLoading.classList.remove('hidden');
    if (mode === 'waiting') {
        els.hintWaiting.innerHTML = `<span class="key">·</span><span class="who">${esc(opts.who)}</span> answering`;
        els.hintWaiting.classList.remove('hidden');
    }
    if (mode === 'answer') {
        els.answer.classList.remove('hidden');
        els.answer.value = '';
        els.answer.focus();
    }
}

// ── WebSocket ────────────────────────────────────────────────────
function buildWsUrl(baseHttpUrl, cid, token) {
    const base = new URL(baseHttpUrl);
    const proto = base.protocol === "https:" ? "wss:" : "ws:";
    const url = new URL(`${proto}//${base.host}/ws/${encodeURIComponent(cid)}`);
    if (token) url.searchParams.set("token", token);
    return url.toString();
}
/** @returns {string|null} password, "" if none, null if user cancelled */
function promptForAccessToken() {
    const typed = window.prompt(
        "Password (ask Zafir)"
    );
    if (typed === null) return null;
    return typed.trim();
}

function sendMessage(payload) {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    ws.send(JSON.stringify(payload));
}

let ws = null;
let socketOpened = false;

function handleMessage({ data }) {
    const msg = JSON.parse(data);

    switch (msg.type) {

    case 'round_started':
        // Mirror the topic everywhere; clear local stream for the new round
        els.topic.value = msg.topic || '';
        state = 'loading';
        els.stream.innerHTML = '';
        els.streamEmpty.textContent = 'Curating topics…';
        els.stream.appendChild(els.streamEmpty);
        currentCard = null;
        currentBody = null;
        currentWordsRead = 0;
        currentQNum = 0;
        action('loading');
        addEvent('join', `<span class="who">${esc(msg.starter)}</span> started a round on “${esc(msg.topic)}”`);
        break;

    case 'player_renamed': {
        // Migrate local map
        if (players.has(msg.old)) {
            const data = players.get(msg.old);
            players.delete(msg.old);
            players.set(msg.new, data);
        } else if (!players.has(msg.new)) {
            players.set(msg.new, { score: 0 });
        }
        const wasMe = (msg.old === clientId);
        if (wasMe) {
            clientId = msg.new;
            localStorage.setItem('qb_cid', clientId);
        }
        // Top-right name always reflects current clientId (stable element ref)
        els.me.textContent = clientId;
        if (msg.scores) ingestScores(msg.scores);
        renderPlayers();
        addEvent('join',
            `<span class="who">${esc(msg.old)}</span> renamed to <span class="who">${esc(msg.new)}</span>`);
        break;
    }

    case 'state_sync':
        // Players + scores
        if (msg.players) msg.players.forEach(id => {
            if (!players.has(id)) players.set(id, { score: 0 });
        });
        if (msg.scores) ingestScores(msg.scores);
        renderPlayers();
        // Late-join mid-question: rebuild the active card
        if (msg.partial_clue) {
            currentQNum = msg.question_number || 0;
            currentCard = createActiveCard(currentQNum);
            currentBody = currentCard.querySelector('.qbody');
            currentWordsRead = msg.words_read || 0;
            streamedWords = msg.partial_clue.split(' ');
            const balanced = _balanceDollars(msg.partial_clue);
            currentBody.innerHTML = window.marked ? marked.parseInline(balanced) : esc(balanced);
            applyKatex(currentBody);
        }
        // Phase-driven UI
        if (msg.phase === 'reading' || msg.phase === 'buzz_window') {
            state = 'reading';
            if (currentCard) setCardState(currentCard, 'reading', 'reading');
            action('reading');
        } else if (msg.phase === 'answering') {
            state = 'locked';
            isBuzzer = (msg.winner === clientId);
            if (currentCard) setCardState(currentCard, 'locked', `${msg.winner} answering`);
            action(isBuzzer ? 'answer' : 'waiting', { who: msg.winner });
        }
        // Resume an active timer countdown
        if (msg.timer && msg.timer.remaining_ms > 0) {
            showTimer(msg.timer.remaining_ms);
        }
        break;

    case 'question_start':
        startNewQuestion(msg.question_number);
        break;

    case 'clue_chunk':
        if (state === 'idle') break;
        if (!currentCard) startNewQuestion(currentQNum + 1);
        if (state !== 'reading') {
            state = 'reading';
            setCardState(currentCard, 'reading', 'reading');
            action('reading');
        }
        appendWord(msg.text);
        currentWordsRead++;
        break;

    case 'lock':
        state = 'locked';
        isBuzzer = (msg.winner === clientId);
        if (currentCard) setCardState(currentCard, 'locked', `${msg.winner} answering`);
        action(isBuzzer ? 'answer' : 'waiting', { who: msg.winner });
        // Server-driven answer timer — visible to EVERYONE
        if (msg.answer_window_ms) showTimer(msg.answer_window_ms);
        addEvent('lock', `<span class="who">${esc(msg.winner)}</span> buzzed`);
        break;

    case 'buzz_window':
        // Reading just finished. Anyone can still buzz; show the countdown.
        state = 'reading';
        if (currentCard) setCardState(currentCard, 'reading', 'reading');
        action('reading');
        showTimer(msg.duration_ms || 10000);
        break;

    case 'wrong_buzz':
        // No feedback transmitted, by design.
        state = 'reading';
        isBuzzer = false;
        hideTimer();
        if (currentCard) setCardState(currentCard, 'reading', 'reading');
        action('reading');
        addEvent('wrong',
            `<span class="who">${esc(msg.guesser)}</span> said “${esc(msg.guess) || '—'}” — wrong`);
        if (msg.scores) ingestScores(msg.scores);
        break;

    case 'reveal': {
        state = 'revealed';
        isBuzzer = false;
        hideTimer();
        const fullAnswer = formatAnswer(msg.answer, msg.answer_aliases);
        if (currentCard) {
            setCardState(currentCard, 'revealed', 'revealed');
            renderReadUnread(msg.full_clue);
            attachResult(currentCard, fullAnswer,
                `<span class="who">${esc(msg.winner)}</span> · “${esc(msg.guess)}”`);
            setSummary(currentCard, fullAnswer, `${msg.winner} ✓`);
        }
        action('next');
        addEvent('correct',
            `<span class="who">${esc(msg.winner)}</span> · ${renderInline(msg.answer)}`);
        if (msg.scores) ingestScores(msg.scores);
        break;
    }

    case 'question_dead': {
        state = 'revealed';
        hideTimer();
        const fullAnswer = formatAnswer(msg.answer, msg.answer_aliases);
        if (currentCard) {
            setCardState(currentCard, 'dead', 'dead');
            if (msg.full_clue) renderReadUnread(msg.full_clue);
            attachResult(currentCard, fullAnswer, 'no correct buzz');
            setSummary(currentCard, fullAnswer, 'dead');
        }
        action('next');
        addEvent('dead', `dead · ${renderInline(msg.answer)}`);
        break;
    }

    case 'reset':
        resetUI();
        break;

    case 'player_joined':
        if (!players.has(msg.player)) players.set(msg.player, { score: 0 });
        renderPlayers();
        els.onlineCount.textContent = msg.count;
        if (msg.player !== clientId) {
            addEvent('join', `<span class="who">${esc(msg.player)}</span> joined`);
        }
        break;

    case 'player_left':
        players.delete(msg.player);
        renderPlayers();
        els.onlineCount.textContent = msg.count;
        addEvent('join', `<span class="who">${esc(msg.player)}</span> left`);
        break;

    case 'error':
        addEvent('join', `error · ${esc(msg.message)}`);
        // Only reset to idle on system flow errors (queue empty / stream failed).
        // Personal errors (rename clash, late buzz) shouldn't disturb game state.
        if ((state === 'reading' || state === 'loading') &&
            /no more|failed/i.test(msg.message || '')) {
            state = 'idle';
            action('idle');
        }
        break;
    }
}

function connectSocket() {
    const token = promptForAccessToken();
    if (token === null) {
        els.stream.innerHTML = '';
        els.streamEmpty.textContent = 'You cancelled. Refresh the page to connect.';
        els.stream.appendChild(els.streamEmpty);
        action('idle');
        return;
    }

    socketOpened = false;
    ws = new WebSocket(buildWsUrl(API_BASE_URL, clientId, token));
    ws.onopen = () => {
        socketOpened = true;
        els.connDot.classList.add('live');
    };
    ws.onclose = (evt) => {
        els.connDot.classList.remove('live');
        if (!socketOpened && evt.code === 1008) {
            alert('Wrong password. Please try again.');
            connectSocket();
        }
    };
    ws.onmessage = handleMessage;
}

// ── Question cards ───────────────────────────────────────────────
function startNewQuestion(qnum) {
    // Collapse the previous active card before adding the new one
    if (currentCard) currentCard.classList.add('collapsed');
    state = 'reading';
    currentQNum = qnum || (currentQNum + 1);
    currentCard = createActiveCard(currentQNum);
    currentBody = currentCard.querySelector('.qbody');
    currentWordsRead = 0;
    streamedWords = [];
    action('reading');
    els.stream.scrollTop = 0; // active card is at the top — keep view there
}

function createActiveCard(qnum) {
    if (els.streamEmpty.parentNode) els.streamEmpty.remove();
    const card = document.createElement('div');
    card.className = 'qcard';
    card.dataset.state = 'reading';
    card.innerHTML = `
        <div class="qhead">
            <span class="qnum">Question ${qnum || '—'}</span>
            <span class="qstate reading">reading</span>
        </div>
        <div class="qbody"></div>
        <div class="qsummary"></div>`;
    // Active card always at the top of the stream
    els.stream.insertBefore(card, els.stream.firstChild);
    // Click toggles open/collapsed once the card is in a finished state.
    // Skip if the user is selecting text inside the card.
    card.addEventListener('click', () => {
        const s = card.dataset.state;
        if (s !== 'revealed' && s !== 'dead') return;
        if (window.getSelection && window.getSelection().toString().length > 0) return;
        card.classList.toggle('collapsed');
    });
    return card;
}

function setCardState(card, name, label) {
    card.dataset.state = name;
    const stateEl = card.querySelector('.qstate');
    stateEl.className = 'qstate ' + name;
    stateEl.textContent = label;
}

// Quizbowl-style display: "Primary (or Alt1; or Alt2)" when the writer
// supplied alternates, otherwise just the primary.
function formatAnswer(answer, aliases) {
    if (!aliases || !aliases.length) return answer;
    return answer + ' (or ' + aliases.join('; or ') + ')';
}

function attachResult(card, answer, metaHTML) {
    let res = card.querySelector('.qresult');
    if (!res) {
        res = document.createElement('div');
        res.className = 'qresult';
        // Insert before .qsummary if present
        const sum = card.querySelector('.qsummary');
        if (sum) card.insertBefore(res, sum); else card.appendChild(res);
    }
    res.innerHTML = `<span>Answer</span><span class="answer">${renderInline(answer)}</span><span class="meta">${metaHTML}</span>`;
    applyKatex(res);
}

function setSummary(card, answer, metaText) {
    const sum = card.querySelector('.qsummary');
    if (!sum) return;
    sum.innerHTML = `<span class="qnum">Q${currentQNum}</span><span class="answer">${renderInline(answer)}</span><span class="meta">${esc(metaText)}</span>`;
    applyKatex(sum);
}

// ── Rendering helpers ───────────────────────────────────────────
// Balances unclosed $ so KaTeX doesn't crash on partial LaTeX mid-stream.
function _balanceDollars(text) {
    const singles = (text.match(/(?<!\$)\$(?!\$)/g) || []).length;
    return singles % 2 !== 0 ? text + '$' : text;
}

// Render inline markdown + LaTeX into a string of HTML.
function renderInline(text) {
    text = _balanceDollars(text);
    // marked.parseInline handles *italic*, **bold**, `code`, etc.
    return window.marked ? marked.parseInline(text) : esc(text);
}

// Apply KaTeX auto-render to an element (runs after innerHTML is set).
function applyKatex(el) {
    if (!window.renderMathInElement) return;
    renderMathInElement(el, {
        delimiters: [
            { left: '$$', right: '$$', display: true  },
            { left: '$',  right: '$',  display: false },
        ],
        throwOnError: false,
    });
}

function appendWord(word) {
    if (!currentBody) return;
    streamedWords.push(word);
    // Re-render the whole accumulated text so KaTeX can see complete $…$
    // pairs — per-word spans break delimiter matching across elements.
    const text = streamedWords.join(' ');
    const balanced = _balanceDollars(text);
    currentBody.innerHTML = window.marked ? marked.parseInline(balanced) : esc(balanced);
    applyKatex(currentBody);
}

function renderReadUnread(fullClue) {
    if (!currentBody) return;
    const words = fullClue.split(' ');
    const readText  = words.slice(0, currentWordsRead).join(' ');
    const unreadText = words.slice(currentWordsRead).join(' ');

    currentBody.innerHTML = '';

    if (readText) {
        const el = document.createElement('span');
        el.className = 'word-read';
        el.innerHTML = renderInline(readText);
        currentBody.appendChild(el);
    }
    if (unreadText) {
        if (readText) currentBody.appendChild(document.createTextNode(' '));
        const el = document.createElement('span');
        el.className = 'word-unread';
        el.innerHTML = renderInline(unreadText);
        currentBody.appendChild(el);
    }
    applyKatex(currentBody);
}

// ── Players + activity ──────────────────────────────────────────
function ingestScores(scores) {
    Object.entries(scores).forEach(([id, sc]) => {
        if (players.has(id)) players.get(id).score = sc;
    });
    renderPlayers();
}

function renderPlayers() {
    els.playersCount.textContent = players.size;
    els.playersList.innerHTML = '';
    if (players.size === 0) {
        els.playersList.innerHTML = '<div style="color:var(--ink-3);font-size:13px;">no one yet</div>';
        return;
    }
    Array.from(players.entries())
        .sort((a, b) => b[1].score - a[1].score)
        .forEach(([id, { score }]) => {
            const cls = score > 0 ? 'pos' : score < 0 ? 'neg' : '';
            const me = id === clientId ? ' me' : '';
            const row = document.createElement('div');
            row.className = 'player-row';
            row.innerHTML = `
                <span class="name${me}">${esc(id)}</span>
                <span class="score ${cls}">${score > 0 ? '+' : ''}${score}</span>`;
            els.playersList.appendChild(row);
        });
}

function addEvent(kind, html) {
    const el = document.createElement('div');
    el.className = 'ev ' + kind;
    el.innerHTML = html;
    els.activity.insertBefore(el, els.activity.firstChild);
}

// ── Timer (display only — server is authoritative) ─────────────
// We just animate the bar; the server triggers transitions on its own
// expiration. So if the client clock drifts or hits 100% early, nothing
// bad happens — the server decides what's next.
function showTimer(ms) {
    els.timer.classList.remove('hidden');
    stopTimerInterval();
    const t0 = Date.now();
    els.timerFill.style.width = '0%';
    timerInterval = setInterval(() => {
        const pct = Math.min(((Date.now() - t0) / ms) * 100, 100);
        els.timerFill.style.width = pct + '%';
        if (pct >= 100) stopTimerInterval();
    }, 100);
}
function hideTimer() {
    stopTimerInterval();
    els.timer.classList.add('hidden');
    els.timerFill.style.width = '0%';
}
function stopTimerInterval() {
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = null;
}

// ── Helpers ─────────────────────────────────────────────────────
function esc(s) {
    return String(s ?? '').replace(/[&<>"']/g, c => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    })[c]);
}

// ── Game actions ────────────────────────────────────────────────
function startGame() {
    const topic = els.topic.value.trim() || 'General Knowledge';
    sendMessage({ type: 'start', topic });
    state = 'loading';
    els.stream.innerHTML = '';
    els.streamEmpty.textContent = 'Curating topics…';
    els.stream.appendChild(els.streamEmpty);
    currentCard = null;
    currentBody = null;
    currentWordsRead = 0;
    currentQNum = 0;
    action('loading');
    els.activity.innerHTML = '';
}

function goNext() {
    sendMessage({ type: 'next' });
    state = 'loading';
    if (currentCard) currentCard.classList.add('collapsed');
    currentCard = null;
    currentBody = null;
    currentWordsRead = 0;
    action('loading');
}

function buzz() {
    if (state === 'reading') sendMessage({ type: 'buzz' });
}

function submitAnswer() {
    const guess = els.answer.value.trim();
    sendMessage({ type: 'submit_answer', guess });
    els.answer.value = '';
}

function resetUI() {
    state = 'idle';
    isBuzzer = false;
    currentCard = null;
    currentBody = null;
    currentWordsRead = 0;
    currentQNum = 0;
    hideTimer();
    els.stream.innerHTML = '';
    els.streamEmpty.textContent = 'Type a topic and start a round.';
    els.stream.appendChild(els.streamEmpty);
    els.activity.innerHTML = '';
    players.forEach(p => { p.score = 0; });
    renderPlayers();
    action('idle');
}

// ── Wire-up ─────────────────────────────────────────────────────
els.startBtn.addEventListener('click', startGame);
els.hintBuzz.addEventListener('click', buzz);
els.hintNext.addEventListener('click', goNext);
els.resetBtn.addEventListener('click', () => sendMessage({ type: 'reset' }));
els.topic.addEventListener('keydown',  e => { if (e.key === 'Enter') startGame(); });
els.answer.addEventListener('keydown', e => { if (e.key === 'Enter') submitAnswer(); });

window.addEventListener('keydown', e => {
    if (document.activeElement.tagName === 'INPUT') return;
    if (e.code === 'Space') { e.preventDefault(); buzz(); }
    if (e.key.toLowerCase() === 'n' && state === 'revealed') goNext();
});

// ── Rename (stable elements — never replaced) ──────────────────
// We toggle visibility between els.me (span) and els.meEdit (input).
// References stay valid forever; updates from player_renamed reliably
// apply to els.me because it's the same DOM node every time.
els.me.title = 'Click to rename';
els.me.addEventListener('click', () => {
    if (!els.meEdit.classList.contains('hidden')) return; // already editing
    els.meEdit.value = clientId;
    els.me.classList.add('hidden');
    els.meEdit.classList.remove('hidden');
    els.meEdit.focus();
    els.meEdit.select();
});

function commitRename() {
    if (els.meEdit.classList.contains('hidden')) return;
    const v = els.meEdit.value.trim();
    els.meEdit.classList.add('hidden');
    els.me.classList.remove('hidden');
    if (v && v !== clientId) {
        sendMessage({ type: 'rename', name: v });
    }
}
function cancelRename() {
    els.meEdit.classList.add('hidden');
    els.me.classList.remove('hidden');
}
els.meEdit.addEventListener('blur', commitRename);
els.meEdit.addEventListener('keydown', e => {
    if (e.key === 'Enter')  { e.preventDefault(); commitRename(); }
    if (e.key === 'Escape') { e.preventDefault(); cancelRename(); }
});

// Initial state
players.set(clientId, { score: 0 });
renderPlayers();
action('idle');
connectSocket();
</script>
</body>
</html>
