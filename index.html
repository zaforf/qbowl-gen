<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>qbowl-gen</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #0a0a0a;
            color: #e5e5e5;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 13px;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        #header {
            border-bottom: 1px solid #1e1e1e;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .logo { font-weight: 700; font-size: 13px; color: #fff; }
        #status { font-size: 11px; color: #444; font-family: monospace; }
        #main {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 720px;
            width: 100%;
            margin: 0 auto;
            padding: 20px 16px 16px;
            gap: 12px;
            min-height: 0;
        }
        #controls-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        #topic-input {
            flex: 1;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            color: #ddd;
            padding: 7px 10px;
            border-radius: 5px;
            font-size: 13px;
            outline: none;
        }
        button {
            background: #1e1e1e;
            border: 1px solid #2a2a2a;
            color: #999;
            padding: 7px 14px;
            border-radius: 5px;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.1s, color 0.1s;
        }
        button:hover { background: #252525; color: #ddd; }
        button.primary { background: #e5e5e5; color: #111; border-color: #e5e5e5; font-weight: 600; }
        button.primary:hover { background: #fff; }
        #clue-area {
            flex: 1;
            background: #111;
            border: 1px solid #1e1e1e;
            border-radius: 6px;
            padding: 18px 20px;
            font-size: 16px;
            line-height: 1.75;
            color: #e0e0e0;
            overflow-y: auto;
            min-height: 160px;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }
        #clue-area.locked { border-color: #5a1e1e; box-shadow: 0 0 20px rgba(90, 30, 30, 0.2); }
        #clue-area.correct { border-color: #1e4a2e; }
        #clue-area.incorrect { border-color: #4a1e1e; }
        .clue-word { transition: color 0.3s ease, opacity 0.3s ease; }
        .clue-unread { color: #333; }
        #reveal-banner {
            background: #161616;
            border: 1px solid #222;
            border-radius: 5px;
            padding: 10px 14px;
            display: flex;
            align-items: baseline;
            gap: 10px;
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .answer-label { font-size: 11px; color: #444; }
        #reveal-answer { font-size: 15px; font-weight: 600; color: #fff; }
        #reveal-answer.correct { color: #4ade80; }
        #reveal-answer.incorrect { color: #f87171; }
        #reveal-feedback { font-size: 12px; color: #555; margin-left: auto; }
        #answer-section {
            display: flex;
            gap: 8px;
            align-items: center;
            animation: fadeIn 0.2s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        #answer-input {
            flex: 1;
            background: #1a1a1a;
            border: 1px solid #333;
            color: #fff;
            padding: 8px 12px;
            border-radius: 5px;
            font-size: 13px;
            outline: none;
        }
        #footer-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .hints { display: flex; gap: 14px; color: #333; font-size: 11px; }
        .hints span { display: flex; align-items: center; gap: 4px; }
        kbd {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            padding: 1px 5px;
            border-radius: 3px;
            color: #555;
            font-size: 10px;
            font-family: monospace;
        }
        #scoreboard {
            display: flex;
            gap: 12px;
            font-size: 12px;
            font-family: monospace;
            color: #666;
        }
        .score-item { display: flex; gap: 4px; }
        .score-val { color: #aaa; font-weight: bold; }
        .hidden { display: none !important; }
        #timer-bar {
            position: absolute;
            top: 0;
            left: 0;
            height: 3px;
            background: #fbbf24;
            width: 0%;
            transition: width 0.1s linear;
        }
    </style>
</head>
<body>

<div id="header">
    <span class="logo">qbowl-gen</span>
    <div id="scoreboard" class="hidden"></div>
    <span id="status">connecting...</span>
</div>

<div id="main" style="position: relative;">
    <div id="timer-bar"></div>
    <div id="controls-row">
        <input id="topic-input" type="text" placeholder="topic (e.g. jazz, ancient rome, linear algebra)">
        <button id="start-btn" class="primary">Start</button>
        <button id="next-btn" class="hidden">Next →</button>
    </div>

    <div id="clue-area">enter a topic and press start</div>

    <div id="reveal-banner" class="hidden">
        <span class="answer-label">answer</span>
        <span id="reveal-answer"></span>
        <span id="reveal-feedback"></span>
    </div>

    <div id="answer-section" class="hidden">
        <input id="answer-input" type="text" placeholder="your answer...">
        <button id="submit-btn" class="primary">Submit</button>
    </div>

    <div id="footer-row">
        <div class="hints">
            <span><kbd>Space</kbd> buzz</span>
            <span><kbd>N</kbd> next</span>
            <span><kbd>Enter</kbd> submit / start</span>
        </div>
        <button id="reset-btn">reset</button>
    </div>
</div>

<script>
    let state = 'idle';
    let isBuzzer = false;
    
    // Session Persistence
    let clientId = localStorage.getItem('qbowl_client_id');
    if (!clientId) {
        clientId = 'player_' + Math.random().toString(36).slice(2, 7);
        localStorage.setItem('qbowl_client_id', clientId);
    }

    let timerInterval;

    const statusEl      = document.getElementById('status');
    const clueEl        = document.getElementById('clue-area');
    const topicInput    = document.getElementById('topic-input');
    const startBtn      = document.getElementById('start-btn');
    const nextBtn       = document.getElementById('next-btn');
    const answerSection = document.getElementById('answer-section');
    const answerInput   = document.getElementById('answer-input');
    const submitBtn     = document.getElementById('submit-btn');
    const revealBanner  = document.getElementById('reveal-banner');
    const revealAnswer  = document.getElementById('reveal-answer');
    const revealFeedback= document.getElementById('reveal-feedback');
    const resetBtn      = document.getElementById('reset-btn');
    const scoreboardEl  = document.getElementById('scoreboard');
    const timerBar      = document.getElementById('timer-bar');

    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const ws = new WebSocket(`${proto}//${location.host}/ws/${clientId}`);

    ws.onopen  = () => { statusEl.textContent = clientId; };
    ws.onclose = () => { statusEl.textContent = 'disconnected'; };

    ws.onmessage = ({ data }) => {
        const msg = JSON.parse(data);

        if (msg.type === 'status') {
            statusEl.textContent = msg.text;
            setClue(msg.text, 'placeholder');
        } else if (msg.type === 'clue_chunk') {
            if (state !== 'reading') {
                state = 'reading';
                clueEl.textContent = '';
                clueEl.className = '';
            }
            // We wrap each word in a span for future styling
            const wordSpan = document.createElement('span');
            wordSpan.className = 'clue-word';
            wordSpan.textContent = ' ' + msg.text;
            clueEl.appendChild(wordSpan);
            clueEl.scrollTop = clueEl.scrollHeight;
        } else if (msg.type === 'lock') {
            state = 'locked';
            isBuzzer = (msg.winner === clientId);
            clueEl.className = 'locked';
            nextBtn.classList.add('hidden');
            statusEl.textContent = `buzzed: ${msg.winner}`;
            
            // Show the rest of the clue as grayed out
            // Since we don't have the full clue yet in the browser, 
            // the server will stop streaming. 
            // To fulfill the "show rest of answer" request, 
            // we would need the server to send the full clue text on lock.
            
            if (isBuzzer) {
                answerSection.classList.remove('hidden');
                answerInput.focus();
                startTimer(10000);
            }
        } else if (msg.type === 'reveal') {
            state = 'revealed';
            isBuzzer = false;
            stopTimer();
            clueEl.className = msg.correct ? 'correct' : 'incorrect';
            revealAnswer.textContent = msg.answer;
            revealAnswer.className = msg.correct ? 'correct' : 'incorrect';
            revealFeedback.textContent = msg.feedback;
            revealBanner.classList.remove('hidden');
            answerSection.classList.add('hidden');
            nextBtn.classList.remove('hidden');
            statusEl.textContent = msg.correct ? '✓ correct' : '✗ incorrect';
            
            if (msg.scores) {
                updateScoreboard(msg.scores);
            }
        } else if (msg.type === 'reset') {
            resetUI();
        } else if (msg.type === 'error') {
            statusEl.textContent = 'error: ' + msg.message;
            if (state === 'reading') {
                state = 'idle';
                setClue('no more questions. enter a new topic to continue.', 'placeholder');
                startBtn.classList.remove('hidden');
                nextBtn.classList.add('hidden');
            }
        }
    };

    function setClue(text, cls = '') {
        clueEl.textContent = text;
        clueEl.className = cls;
    }

    function updateScoreboard(scores) {
        scoreboardEl.innerHTML = '';
        scoreboardEl.classList.remove('hidden');
        Object.entries(scores).forEach(([id, score]) => {
            const item = document.createElement('div');
            item.className = 'score-item';
            item.innerHTML = `<span>${id.slice(-4)}:</span> <span class="score-val">${score}</span>`;
            scoreboardEl.appendChild(item);
        });
    }

    function startTimer(duration) {
        stopTimer();
        let start = Date.now();
        timerInterval = setInterval(() => {
            let elapsed = Date.now() - start;
            let progress = (elapsed / duration) * 100;
            timerBar.style.width = Math.min(progress, 100) + '%';
            if (elapsed >= duration) {
                stopTimer();
                ws.send(JSON.stringify({ type: 'submit_answer', guess: '' }));
            }
        }, 100);
    }

    function stopTimer() {
        clearInterval(timerInterval);
        timerBar.style.width = '0%';
    }

    function resetUI() {
        state = 'idle';
        isBuzzer = false;
        setClue('enter a topic and press start', 'placeholder');
        revealBanner.classList.add('hidden');
        answerSection.classList.add('hidden');
        nextBtn.classList.add('hidden');
        startBtn.classList.remove('hidden');
        statusEl.textContent = clientId;
        scoreboardEl.classList.add('hidden');
        stopTimer();
    }

    function startGame() {
        const topic = topicInput.value.trim() || 'General Knowledge';
        ws.send(JSON.stringify({ type: 'start', topic }));
        state = 'loading';
        setClue('', 'placeholder');
        revealBanner.classList.add('hidden');
        answerSection.classList.add('hidden');
        nextBtn.classList.add('hidden');
        startBtn.classList.add('hidden');
    }

    function goNext() {
        ws.send(JSON.stringify({ type: 'next' }));
        state = 'loading';
        setClue('', '');
        revealBanner.classList.add('hidden');
        nextBtn.classList.add('hidden');
        answerSection.classList.add('hidden');
    }

    function submitAnswer() {
        const guess = answerInput.value.trim();
        ws.send(JSON.stringify({ type: 'submit_answer', guess }));
        answerInput.value = '';
    }

    startBtn.onclick = startGame;
    nextBtn.onclick  = goNext;
    submitBtn.onclick = submitAnswer;
    resetBtn.onclick = () => ws.send(JSON.stringify({ type: 'reset' }));

    topicInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') startGame(); });
    answerInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') submitAnswer(); });

    window.addEventListener('keydown', (e) => {
        if (document.activeElement.tagName === 'INPUT') return;
        if (e.code === 'Space') {
            e.preventDefault();
            if (state === 'reading') ws.send(JSON.stringify({ type: 'buzz' }));
        }
        if (e.key.toLowerCase() === 'n' && state === 'revealed') goNext();
    });
</script>
</body>
</html>
