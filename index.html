<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>qbowl-gen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #111; color: #eee; font-family: ui-sans-serif, system-ui, sans-serif; }
        .buzz-btn { transition: transform 0.1s active; }
        .buzz-btn:active { transform: scale(0.95); }
        .hidden { display: none; }
    </style>
</head>
<body class="h-screen flex flex-col items-center justify-center p-4">
    <div id="game-container" class="w-full max-w-2xl text-center space-y-8">
        <div id="status" class="text-xl font-medium text-gray-400">Connecting...</div>
        
        <div id="clue-area" class="text-2xl font-semibold min-h-[150px] leading-relaxed">
            Waiting for game to start...
        </div>

        <div id="input-area" class="hidden flex flex-col items-center space-y-4">
            <input id="answer-input" type="text" placeholder="Type your answer..." 
                   class="bg-gray-800 text-white text-2xl p-4 rounded-lg border-2 border-gray-600 w-full max-w-md outline-none focus:border-yellow-400">
            <button id="submit-btn" class="bg-yellow-500 hover:bg-yellow-400 text-black font-bold py-2 px-6 rounded-lg transition">
                Submit Answer
            </button>
        </div>

        <button id="buzz-btn" class="buzz-btn w-48 h-48 rounded-full bg-red-600 hover:bg-red-500 text-white text-4xl font-black shadow-2xl border-8 border-red-800 uppercase tracking-tighter">
            BUZZ
        </button>

        <div id="winner-display" class="text-3xl font-bold text-yellow-400 hidden"></div>
        
        <div id="controls" class="flex justify-center space-x-4 pt-8">
            <input id="topic-input" type="text" placeholder="Topic..." class="bg-gray-800 p-2 rounded border border-gray-600 outline-none">
            <button id="start-btn" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded transition">Start Game</button>
        </div>
        
        <button id="reset-btn" class="block mx-auto text-xs text-gray-600 underline opacity-30 hover:opacity-100">Debug Reset</button>
    </div>

    <script>
        const clientId = "Player_" + Math.floor(Math.random() * 1000);
        const statusEl = document.getElementById('status');
        const clueEl = document.getElementById('clue-area');
        const buzzBtn = document.getElementById('buzz-btn');
        const winnerEl = document.getElementById('winner-display');
        const resetBtn = document.getElementById('reset-btn');
        const startBtn = document.getElementById('start-btn');
        const topicInput = document.getElementById('topic-input');
        const inputArea = document.getElementById('input-area');
        const answerInput = document.getElementById('answer-input');
        const submitBtn = document.getElementById('submit-btn');

        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const ws = new WebSocket(`${protocol}//${window.location.host}/ws/${clientId}`);

        ws.onopen = () => {
            statusEl.innerText = `Connected as ${clientId}`;
        };

        ws.onmessage = (event) => {
            const msg = JSON.parse(event.data);
            
            if (msg.type === 'clue_chunk') {
                if (clueEl.innerText === "Waiting for game to start..." || clueEl.innerText === "LOCKED!") {
                    clueEl.innerText = "";
                }
                clueEl.innerText += " " + msg.text;
            } else if (msg.type === 'lock') {
                clueEl.innerHTML = `<span class="text-red-500">LOCKED!</span><br>${clueEl.innerText}`;
                winnerEl.innerText = `Buzzer: ${msg.winner}`;
                winnerEl.classList.remove('hidden');
                
                if (msg.winner === clientId) {
                    inputArea.classList.remove('hidden');
                    buzzBtn.classList.add('hidden');
                } else {
                    buzzBtn.disabled = true;
                    buzzBtn.classList.add('opacity-50', 'cursor-not-allowed');
                }
            } else if (msg.type === 'reveal') {
                winnerEl.innerHTML = `Winner: ${msg.winner}<br><span class="text-white text-xl">${msg.feedback}</span>`;
                clueEl.innerHTML = `Correct Answer: <span class="text-yellow-400">${msg.answer}</span>`;
                inputArea.classList.add('hidden');
                buzzBtn.classList.remove('hidden');
                buzzBtn.disabled = true;
                buzzBtn.classList.add('opacity-50', 'cursor-not-allowed');
            } else if (msg.type === 'reset') {
                clueEl.innerText = "Waiting for game to start...";
                winnerEl.classList.add('hidden');
                inputArea.classList.add('hidden');
                buzzBtn.disabled = false;
                buzzBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            } else if (msg.type === 'error') {
                alert(msg.message);
            }
        };

        startBtn.onclick = () => {
            const topic = topicInput.value || "General Knowledge";
            ws.send(JSON.stringify({ type: 'start', topic: topic }));
            clueEl.innerText = "Thinking of a topic...";
            buzzBtn.disabled = false;
            buzzBtn.classList.remove('opacity-50', 'cursor-not-allowed');
        };

        buzzBtn.onclick = () => {
            ws.send(JSON.stringify({ type: 'buzz' }));
        };

        submitBtn.onclick = () => {
            ws.send(JSON.stringify({ type: 'submit_answer', guess: answerInput.value }));
            answerInput.value = "";
        };

        resetBtn.onclick = () => {
            ws.send(JSON.stringify({ type: 'reset' }));
        };

        ws.onclose = () => {
            statusEl.innerText = "Disconnected from server";
        };
    </script>
</body>
</html>
