<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>qbowl-gen</title>
    <style>
        :root {
            --bg:        #fafaf9;
            --panel:     #ffffff;
            --ink:       #1a1a1a;
            --ink-2:     #525252;
            --ink-3:     #a1a1a1;
            --rule:      #e5e5e5;
            --rule-soft: #f1f1ef;
            --accent:    #1a1a1a;
            --good:      #15803d;
            --bad:       #b91c1c;
            --warn:      #b45309;
            --good-bg:   #f0fdf4;
            --warn-bg:   #fffbeb;
            --bad-bg:    #fef2f2;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        * {
            scrollbar-width: thin;
            scrollbar-color: #d4d4d4 transparent;
        }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d4d4d4; border-radius: 3px; }

        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, system-ui, "Segoe UI", Helvetica, Arial, sans-serif;
            font-size: 14px;
            line-height: 1.5;
            font-feature-settings: "tnum" 1;
            background: var(--bg);
            color: var(--ink);
            -webkit-font-smoothing: antialiased;
        }
        body {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        button, input { font-family: inherit; font-size: inherit; color: inherit; }

        /* ── Header ─────────────────────────────────────────── */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 24px;
            border-bottom: 1px solid var(--rule);
            flex-shrink: 0;
        }
        .brand { font-weight: 600; font-size: 14px; }
        .brand-dot {
            display: inline-block;
            width: 7px; height: 7px;
            background: var(--ink-3);
            border-radius: 50%;
            margin: 0 2px 0 1px;
            vertical-align: 2px;
        }
        .brand-dot.live { background: var(--good); }
        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
            color: var(--ink-2);
            font-size: 13px;
        }
        .me { color: var(--ink); }
        .reset {
            color: var(--ink-3);
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 6px;
        }
        .reset:hover { color: var(--ink); background: var(--rule-soft); }

        /* ── Layout ─────────────────────────────────────────── */
        .layout {
            flex: 1;
            display: grid;
            grid-template-columns: minmax(0, 1fr) 280px;
            overflow: hidden;
            max-width: 1180px;
            width: 100%;
            margin: 0 auto;
        }

        /* ── Main column ────────────────────────────────────── */
        main {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-right: 1px solid var(--rule);
        }

        /* Topic row */
        .topic-row {
            display: flex;
            gap: 8px;
            align-items: center;
            padding: 16px 24px;
            border-bottom: 1px solid var(--rule);
            flex-shrink: 0;
        }
        .topic-row .label {
            font-size: 13px;
            color: var(--ink-3);
            margin-right: 4px;
        }
        .input {
            background: var(--panel);
            border: 1px solid var(--rule);
            color: var(--ink);
            padding: 8px 12px;
            border-radius: 6px;
            outline: none;
            min-width: 0;
        }
        .input:focus { border-color: var(--ink-2); }
        .input::placeholder { color: var(--ink-3); }
        .input.flex { flex: 1; }

        .btn {
            background: var(--panel);
            border: 1px solid var(--rule);
            color: var(--ink);
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
        }
        .btn:hover { background: var(--rule-soft); }
        .btn-primary {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }
        .btn-primary:hover { background: #000; }

        /* Stream — vertical list of question cards.
           Active card sits at the top; past cards collapse beneath. */
        .stream {
            flex: 1;
            overflow-y: auto;
            padding: 18px 24px;
        }
        .stream-empty {
            color: var(--ink-3);
            text-align: center;
            padding: 64px 20px;
            font-size: 14px;
        }

        .qcard {
            background: var(--panel);
            border: 1px solid var(--rule);
            border-radius: 6px;
            padding: 14px 18px;
            margin-bottom: 10px;
        }
        .qcard[data-state="locked"]   { background: var(--bad-bg); }
        .qcard[data-state="revealed"] { background: var(--good-bg); }
        .qcard[data-state="dead"]     { background: var(--warn-bg); }

        .qhead {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: var(--ink-3);
            margin-bottom: 8px;
        }
        .qhead .qnum { color: var(--ink-2); }
        .qstate.reading  { color: var(--ink-2); }
        .qstate.locked   { color: var(--bad); }
        .qstate.revealed { color: var(--good); }
        .qstate.dead     { color: var(--warn); }

        .qbody {
            font-size: 16px;
            line-height: 1.65;
            color: var(--ink);
        }
        .word-read   { color: var(--ink); }
        .word-unread { color: var(--ink-3); }

        .qresult {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid var(--rule);
            display: flex;
            align-items: baseline;
            gap: 10px;
            flex-wrap: wrap;
            font-size: 13px;
            color: var(--ink-2);
        }
        .qresult .answer {
            color: var(--ink);
            font-weight: 600;
        }
        .qresult .meta {
            margin-left: auto;
            color: var(--ink-2);
        }

        /* Collapsed past-question card: a single compact line */
        .qcard.collapsed {
            padding: 8px 14px;
            margin-bottom: 6px;
            cursor: pointer;
        }
        .qcard.collapsed .qhead { margin-bottom: 0; }
        .qcard.collapsed .qbody,
        .qcard.collapsed .qresult { display: none; }
        .qcard.collapsed .qsummary {
            display: flex;
            align-items: baseline;
            gap: 10px;
            font-size: 13px;
            color: var(--ink-2);
        }
        .qcard.collapsed .qsummary .answer {
            color: var(--ink);
            font-weight: 600;
        }
        .qcard.collapsed .qsummary .meta {
            margin-left: auto;
            color: var(--ink-3);
            font-size: 12px;
        }
        .qcard:not(.collapsed) .qsummary { display: none; }

        /* Action strip — minimal, pinned at the bottom */
        .action {
            flex-shrink: 0;
            padding: 12px 24px 16px;
            border-top: 1px solid var(--rule);
            min-height: 56px;
        }
        .action-line {
            display: flex;
            gap: 10px;
            align-items: center;
            min-height: 36px;
        }
        .hint {
            color: var(--ink-2);
            font-size: 13px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            user-select: none;
            padding: 6px 0;
        }
        .hint:hover { color: var(--ink); }
        .hint .key {
            font-size: 11px;
            font-weight: 500;
            padding: 2px 7px;
            border-radius: 4px;
            background: var(--panel);
            border: 1px solid var(--rule);
            color: var(--ink);
            min-width: 22px;
            text-align: center;
        }
        .hint:hover .key { background: var(--rule-soft); }
        .hint.muted { cursor: default; color: var(--ink-3); }
        .hint.muted:hover { color: var(--ink-3); }
        .hint.muted .key { color: var(--ink-3); }

        .timer {
            margin-top: 10px;
            height: 2px;
            background: var(--rule-soft);
            border-radius: 1px;
            overflow: hidden;
        }
        .timer-fill {
            height: 100%;
            width: 0%;
            background: var(--warn);
            transition: width 100ms linear;
        }

        .answer-input { flex: 1; }

        /* ── Sidebar ────────────────────────────────────────── */
        aside {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .panel {
            padding: 18px 22px;
            border-bottom: 1px solid var(--rule);
        }
        .panel:last-child {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-bottom: none;
        }
        .panel-title {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            font-size: 12px;
            color: var(--ink-3);
            margin-bottom: 12px;
        }

        .players-list { display: flex; flex-direction: column; gap: 4px; }
        .player-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 13px;
            padding: 2px 0;
        }
        .player-row .name { color: var(--ink); }
        .player-row .name.me::after {
            content: ' you';
            color: var(--ink-3);
            font-size: 11px;
        }
        .player-row .score { color: var(--ink-2); font-weight: 500; }
        .player-row .score.pos { color: var(--good); }
        .player-row .score.neg { color: var(--bad); }

        .activity-list {
            flex: 1;
            overflow-y: auto;
            margin: 0 -22px;
            padding: 0 22px;
            font-size: 13px;
        }
        .ev {
            padding: 6px 0;
            color: var(--ink-2);
            border-bottom: 1px solid var(--rule-soft);
        }
        .ev:last-child { border-bottom: none; }
        .ev .who { color: var(--ink); }
        .ev.correct .who { color: var(--good); }
        .ev.wrong .who   { color: var(--warn); }
        .ev.dead .who    { color: var(--warn); }
        .ev.lock .who    { color: var(--bad); }
        .ev.join .who    { color: var(--ink-2); }

        .hidden { display: none !important; }

        @media (max-width: 880px) {
            .layout { grid-template-columns: 1fr; }
            aside { display: none; }
        }
    </style>
</head>
<body>

<header>
    <span class="brand">qbowl<span class="brand-dot" id="conn-dot"></span>gen</span>
    <div class="header-right">
        <span><span id="online-count">1</span> online</span>
        <span class="me" id="me-id">…</span>
        <button class="reset" id="reset-btn">reset</button>
    </div>
</header>

<div class="layout">
    <main>
        <div class="topic-row">
            <span class="label">Topic</span>
            <input id="topic-input" class="input flex" type="text"
                   placeholder="ancient rome, jazz, linear algebra…">
            <button id="start-btn" class="btn btn-primary">Start round</button>
        </div>

        <div class="stream" id="stream">
            <div class="stream-empty" id="stream-empty">
                Type a topic and start a round.
            </div>
        </div>

        <div class="action">
            <div class="action-line" id="action-line">
                <span class="hint muted" id="hint-idle">
                    <span class="key">⏎</span>
                    start a round
                </span>
                <span class="hint" id="hint-buzz">
                    <span class="key">space</span>
                    buzz in
                </span>
                <span class="hint muted" id="hint-waiting"></span>
                <input id="answer-input" type="text" class="input answer-input hidden"
                       placeholder="type your answer…" autocomplete="off">
                <span class="hint" id="hint-next">
                    <span class="key">N</span>
                    next question
                </span>
                <span class="hint muted" id="hint-loading">
                    <span class="key">…</span>
                    preparing
                </span>
            </div>
            <div class="timer hidden" id="timer">
                <div class="timer-fill" id="timer-fill"></div>
            </div>
        </div>
    </main>

    <aside>
        <div class="panel">
            <div class="panel-title">
                <span>Players</span>
                <span id="players-count">0</span>
            </div>
            <div class="players-list" id="players-list"></div>
        </div>
        <div class="panel">
            <div class="panel-title"><span>Activity</span></div>
            <div class="activity-list" id="activity"></div>
        </div>
    </aside>
</div>

<script>
"use strict";

// ── State ────────────────────────────────────────────────────────
let state = 'idle';         // idle | loading | reading | locked | revealed
let isBuzzer = false;
let timerInterval = null;
let currentCard = null;
let currentBody = null;
let currentWordsRead = 0;
let currentQNum = 0;
const players = new Map();

const clientId = (() => {
    let id = localStorage.getItem('qb_cid');
    if (!id) {
        id = 'p_' + Math.random().toString(36).slice(2, 7);
        localStorage.setItem('qb_cid', id);
    }
    return id;
})();

const $ = id => document.getElementById(id);
const els = {
    me: $('me-id'),
    onlineCount: $('online-count'),
    connDot: $('conn-dot'),
    topic: $('topic-input'),
    startBtn: $('start-btn'),
    stream: $('stream'),
    streamEmpty: $('stream-empty'),
    answer: $('answer-input'),
    hintIdle: $('hint-idle'),
    hintBuzz: $('hint-buzz'),
    hintWaiting: $('hint-waiting'),
    hintNext: $('hint-next'),
    hintLoading: $('hint-loading'),
    timer: $('timer'),
    timerFill: $('timer-fill'),
    playersList: $('players-list'),
    playersCount: $('players-count'),
    activity: $('activity'),
    resetBtn: $('reset-btn'),
};
els.me.textContent = clientId;

// Action-zone modes are mutually exclusive
function action(mode, opts = {}) {
    [els.hintIdle, els.hintBuzz, els.hintWaiting,
     els.answer, els.hintNext, els.hintLoading, els.timer].forEach(e => e.classList.add('hidden'));

    if (mode === 'idle')    els.hintIdle.classList.remove('hidden');
    if (mode === 'reading') els.hintBuzz.classList.remove('hidden');
    if (mode === 'next')    els.hintNext.classList.remove('hidden');
    if (mode === 'loading') els.hintLoading.classList.remove('hidden');
    if (mode === 'waiting') {
        els.hintWaiting.innerHTML = `<span class="key">·</span><span class="who">${esc(opts.who)}</span> answering`;
        els.hintWaiting.classList.remove('hidden');
    }
    if (mode === 'answer') {
        els.answer.classList.remove('hidden');
        els.answer.value = '';
        els.answer.focus();
        els.timer.classList.remove('hidden');
        startTimer(10000);
    }
}

// ── WebSocket ────────────────────────────────────────────────────
const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
const ws = new WebSocket(`${proto}//${location.host}/ws/${clientId}`);

ws.onopen  = () => { els.connDot.classList.add('live'); };
ws.onclose = () => { els.connDot.classList.remove('live'); };

ws.onmessage = ({ data }) => {
    const msg = JSON.parse(data);

    switch (msg.type) {

    case 'state_sync':
        if (msg.players) msg.players.forEach(id => {
            if (!players.has(id)) players.set(id, { score: 0 });
        });
        if (msg.scores) ingestScores(msg.scores);
        renderPlayers();
        if (msg.partial_clue) {
            // Late-join mid-question
            currentQNum = msg.question_number || 0;
            state = msg.locked ? 'locked' : 'reading';
            currentCard = createActiveCard(currentQNum);
            currentBody = currentCard.querySelector('.qbody');
            currentWordsRead = msg.words_read || 0;
            const words = msg.partial_clue.split(' ');
            currentBody.textContent = '';
            words.forEach((w, i) => {
                const s = document.createElement('span');
                s.className = 'word-read';
                s.textContent = (i ? ' ' : '') + w;
                currentBody.appendChild(s);
            });
            if (msg.locked) {
                setCardState(currentCard, 'locked', `${msg.winner} answering`);
                action(msg.winner === clientId ? 'answer' : 'waiting', { who: msg.winner });
            } else {
                action('reading');
            }
        }
        break;

    case 'question_start':
        startNewQuestion(msg.question_number);
        break;

    case 'clue_chunk':
        if (state === 'idle') break;
        if (!currentCard) startNewQuestion(currentQNum + 1);
        if (state !== 'reading') {
            state = 'reading';
            setCardState(currentCard, 'reading', 'reading');
            action('reading');
        }
        appendWord(msg.text);
        currentWordsRead++;
        break;

    case 'lock':
        state = 'locked';
        isBuzzer = (msg.winner === clientId);
        if (currentCard) setCardState(currentCard, 'locked', `${msg.winner} answering`);
        action(isBuzzer ? 'answer' : 'waiting', { who: msg.winner });
        addEvent('lock', `<span class="who">${esc(msg.winner)}</span> buzzed`);
        break;

    case 'wrong_buzz':
        // No feedback transmitted, by design.
        state = 'reading';
        isBuzzer = false;
        stopTimer();
        if (currentCard) setCardState(currentCard, 'reading', 'reading');
        action('reading');
        addEvent('wrong',
            `<span class="who">${esc(msg.guesser)}</span> said “${esc(msg.guess) || '—'}” — wrong`);
        if (msg.scores) ingestScores(msg.scores);
        break;

    case 'reveal':
        state = 'revealed';
        isBuzzer = false;
        stopTimer();
        if (currentCard) {
            setCardState(currentCard, 'revealed', 'revealed');
            renderReadUnread(msg.full_clue);
            attachResult(currentCard, msg.answer,
                `<span class="who">${esc(msg.winner)}</span> · “${esc(msg.guess)}”`);
            setSummary(currentCard, msg.answer, `${msg.winner} ✓`);
        }
        action('next');
        addEvent('correct',
            `<span class="who">${esc(msg.winner)}</span> · ${esc(msg.answer)}`);
        if (msg.scores) ingestScores(msg.scores);
        break;

    case 'question_dead':
        state = 'revealed';
        stopTimer();
        if (currentCard) {
            setCardState(currentCard, 'dead', 'dead');
            if (msg.full_clue) renderReadUnread(msg.full_clue);
            attachResult(currentCard, msg.answer, 'no correct buzz');
            setSummary(currentCard, msg.answer, 'dead');
        }
        action('next');
        addEvent('dead', `dead · ${esc(msg.answer)}`);
        break;

    case 'reset':
        resetUI();
        break;

    case 'player_joined':
        if (!players.has(msg.player)) players.set(msg.player, { score: 0 });
        renderPlayers();
        els.onlineCount.textContent = msg.count;
        if (msg.player !== clientId) {
            addEvent('join', `<span class="who">${esc(msg.player)}</span> joined`);
        }
        break;

    case 'player_left':
        players.delete(msg.player);
        renderPlayers();
        els.onlineCount.textContent = msg.count;
        addEvent('join', `<span class="who">${esc(msg.player)}</span> left`);
        break;

    case 'error':
        if (state === 'reading' || state === 'loading') {
            state = 'idle';
            action('idle');
        }
        addEvent('join', `error · ${esc(msg.message)}`);
        break;
    }
};

// ── Question cards ───────────────────────────────────────────────
function startNewQuestion(qnum) {
    // Collapse the previous active card before adding the new one
    if (currentCard) currentCard.classList.add('collapsed');
    state = 'reading';
    currentQNum = qnum || (currentQNum + 1);
    currentCard = createActiveCard(currentQNum);
    currentBody = currentCard.querySelector('.qbody');
    currentWordsRead = 0;
    action('reading');
    els.stream.scrollTop = 0; // active card is at the top — keep view there
}

function createActiveCard(qnum) {
    if (els.streamEmpty.parentNode) els.streamEmpty.remove();
    const card = document.createElement('div');
    card.className = 'qcard';
    card.dataset.state = 'reading';
    card.innerHTML = `
        <div class="qhead">
            <span class="qnum">Question ${qnum || '—'}</span>
            <span class="qstate reading">reading</span>
        </div>
        <div class="qbody"></div>
        <div class="qsummary"></div>`;
    // Active card always at the top of the stream
    els.stream.insertBefore(card, els.stream.firstChild);
    // Click on a collapsed card toggles expansion
    card.addEventListener('click', e => {
        // Only react to clicks when collapsed
        if (card.classList.contains('collapsed')) {
            // Expand inline (tap to peek). Click again to recollapse.
            card.classList.remove('collapsed');
            // Recollapse on next click anywhere
            const onAway = ev => {
                if (!card.contains(ev.target)) {
                    card.classList.add('collapsed');
                    document.removeEventListener('click', onAway, true);
                }
            };
            setTimeout(() => document.addEventListener('click', onAway, true), 0);
        }
    });
    return card;
}

function setCardState(card, name, label) {
    card.dataset.state = name;
    const stateEl = card.querySelector('.qstate');
    stateEl.className = 'qstate ' + name;
    stateEl.textContent = label;
}

function attachResult(card, answer, metaHTML) {
    let res = card.querySelector('.qresult');
    if (!res) {
        res = document.createElement('div');
        res.className = 'qresult';
        // Insert before .qsummary if present
        const sum = card.querySelector('.qsummary');
        if (sum) card.insertBefore(res, sum); else card.appendChild(res);
    }
    res.innerHTML = `<span>Answer</span><span class="answer">${esc(answer)}</span><span class="meta">${metaHTML}</span>`;
}

function setSummary(card, answer, metaText) {
    const sum = card.querySelector('.qsummary');
    if (!sum) return;
    sum.innerHTML = `<span class="qnum">Q${currentQNum}</span><span class="answer">${esc(answer)}</span><span class="meta">${esc(metaText)}</span>`;
}

function appendWord(word) {
    if (!currentBody) return;
    const s = document.createElement('span');
    s.className = 'word-read';
    s.textContent = (currentBody.children.length ? ' ' : '') + word;
    currentBody.appendChild(s);
}

function renderReadUnread(fullClue) {
    if (!currentBody) return;
    const words = fullClue.split(' ');
    currentBody.textContent = '';
    words.forEach((w, i) => {
        const s = document.createElement('span');
        s.className = i < currentWordsRead ? 'word-read' : 'word-unread';
        s.textContent = (i ? ' ' : '') + w;
        currentBody.appendChild(s);
    });
}

// ── Players + activity ──────────────────────────────────────────
function ingestScores(scores) {
    Object.entries(scores).forEach(([id, sc]) => {
        if (players.has(id)) players.get(id).score = sc;
    });
    renderPlayers();
}

function renderPlayers() {
    els.playersCount.textContent = players.size;
    els.playersList.innerHTML = '';
    if (players.size === 0) {
        els.playersList.innerHTML = '<div style="color:var(--ink-3);font-size:13px;">no one yet</div>';
        return;
    }
    Array.from(players.entries())
        .sort((a, b) => b[1].score - a[1].score)
        .forEach(([id, { score }]) => {
            const cls = score > 0 ? 'pos' : score < 0 ? 'neg' : '';
            const me = id === clientId ? ' me' : '';
            const row = document.createElement('div');
            row.className = 'player-row';
            row.innerHTML = `
                <span class="name${me}">${esc(id)}</span>
                <span class="score ${cls}">${score > 0 ? '+' : ''}${score}</span>`;
            els.playersList.appendChild(row);
        });
}

function addEvent(kind, html) {
    const el = document.createElement('div');
    el.className = 'ev ' + kind;
    el.innerHTML = html;
    els.activity.insertBefore(el, els.activity.firstChild);
}

// ── Timer ───────────────────────────────────────────────────────
function startTimer(ms) {
    stopTimer();
    const t0 = Date.now();
    timerInterval = setInterval(() => {
        const pct = Math.min(((Date.now() - t0) / ms) * 100, 100);
        els.timerFill.style.width = pct + '%';
        if (pct >= 100) {
            stopTimer();
            ws.send(JSON.stringify({ type: 'submit_answer', guess: '' }));
        }
    }, 100);
}
function stopTimer() {
    clearInterval(timerInterval);
    timerInterval = null;
    els.timerFill.style.width = '0%';
}

// ── Helpers ─────────────────────────────────────────────────────
function esc(s) {
    return String(s ?? '').replace(/[&<>"']/g, c => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    })[c]);
}

// ── Game actions ────────────────────────────────────────────────
function startGame() {
    const topic = els.topic.value.trim() || 'General Knowledge';
    ws.send(JSON.stringify({ type: 'start', topic }));
    state = 'loading';
    els.stream.innerHTML = '';
    els.streamEmpty.textContent = 'Curating topics…';
    els.stream.appendChild(els.streamEmpty);
    currentCard = null;
    currentBody = null;
    currentWordsRead = 0;
    currentQNum = 0;
    action('loading');
    els.activity.innerHTML = '';
}

function goNext() {
    ws.send(JSON.stringify({ type: 'next' }));
    state = 'loading';
    if (currentCard) currentCard.classList.add('collapsed');
    currentCard = null;
    currentBody = null;
    currentWordsRead = 0;
    action('loading');
}

function buzz() {
    if (state === 'reading') ws.send(JSON.stringify({ type: 'buzz' }));
}

function submitAnswer() {
    const guess = els.answer.value.trim();
    ws.send(JSON.stringify({ type: 'submit_answer', guess }));
    els.answer.value = '';
}

function resetUI() {
    state = 'idle';
    isBuzzer = false;
    currentCard = null;
    currentBody = null;
    currentWordsRead = 0;
    currentQNum = 0;
    stopTimer();
    els.stream.innerHTML = '';
    els.streamEmpty.textContent = 'Type a topic and start a round.';
    els.stream.appendChild(els.streamEmpty);
    els.activity.innerHTML = '';
    players.forEach(p => { p.score = 0; });
    renderPlayers();
    action('idle');
}

// ── Wire-up ─────────────────────────────────────────────────────
els.startBtn.addEventListener('click', startGame);
els.hintBuzz.addEventListener('click', buzz);
els.hintNext.addEventListener('click', goNext);
els.resetBtn.addEventListener('click', () => ws.send(JSON.stringify({ type: 'reset' })));
els.topic.addEventListener('keydown',  e => { if (e.key === 'Enter') startGame(); });
els.answer.addEventListener('keydown', e => { if (e.key === 'Enter') submitAnswer(); });

window.addEventListener('keydown', e => {
    if (document.activeElement.tagName === 'INPUT') return;
    if (e.code === 'Space') { e.preventDefault(); buzz(); }
    if (e.key.toLowerCase() === 'n' && state === 'revealed') goNext();
});

// Initial state
players.set(clientId, { score: 0 });
renderPlayers();
action('idle');
</script>
</body>
</html>
