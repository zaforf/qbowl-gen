<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>qbowl-gen</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:        #fbfaf7;
            --panel:     #ffffff;
            --ink:       #18181b;
            --ink-2:     #52525b;
            --ink-3:     #a1a1aa;
            --rule:      #e7e5e4;
            --rule-2:    #f4f4f0;
            --accent:    #1f2937;
            --accent-fg: #ffffff;
            --good:      #15803d;
            --bad:       #b91c1c;
            --warn:      #b45309;
            --good-bg:   #f0fdf4;
            --good-bd:   #bbf7d0;
            --bad-bg:    #fef2f2;
            --bad-bd:    #fecaca;
            --warn-bg:   #fffbeb;
            --warn-bd:   #fde68a;

            --font-ui:   'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
            --font-read: 'Source Serif 4', 'Charter', 'Georgia', serif;
            --font-mono: 'JetBrains Mono', ui-monospace, Menlo, monospace;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        * { scrollbar-width: thin; scrollbar-color: #d4d4d4 transparent; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d4d4d4; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #a3a3a3; }

        body {
            background: var(--bg);
            color: var(--ink);
            font-family: var(--font-ui);
            font-size: 14px;
            line-height: 1.5;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Header ── */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 28px;
            border-bottom: 1px solid var(--rule);
            flex-shrink: 0;
        }
        .brand { font-weight: 700; font-size: 15px; letter-spacing: -0.02em; }
        .brand .dot { color: var(--bad); }
        .header-right {
            display: flex;
            align-items: center;
            gap: 18px;
            font-size: 13px;
            color: var(--ink-2);
        }
        .me { font-family: var(--font-mono); font-size: 12px; color: var(--ink); }
        .online { display: inline-flex; align-items: center; gap: 6px; }
        .online-dot {
            width: 7px; height: 7px;
            background: var(--good);
            border-radius: 50%;
        }

        /* ── Layout ── */
        .layout {
            flex: 1;
            display: grid;
            grid-template-columns: minmax(0, 1fr) 300px;
            overflow: hidden;
            max-width: 1280px;
            width: 100%;
            margin: 0 auto;
        }

        /* ── Main column ── */
        main {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-right: 1px solid var(--rule);
        }

        /* ── Topic bar (top, fixed) ── */
        .topic-bar {
            flex-shrink: 0;
            padding: 16px 28px;
            display: flex;
            gap: 8px;
            align-items: center;
            border-bottom: 1px solid var(--rule);
        }
        .topic-bar .label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 600;
            color: var(--ink-3);
        }

        /* ── Question stream (scrollable middle) ── */
        .stream {
            flex: 1;
            overflow-y: auto;
            padding: 20px 28px 8px;
        }
        .stream-empty {
            color: var(--ink-3);
            font-size: 14px;
            text-align: center;
            padding: 60px 20px;
            font-family: var(--font-read);
            font-size: 16px;
            font-style: normal;
        }

        /* ── Question card ── */
        .qcard {
            background: var(--panel);
            border: 1px solid var(--rule);
            border-radius: 10px;
            padding: 16px 22px 18px;
            margin-bottom: 14px;
            transition: border-color 200ms, background 200ms;
        }
        .qcard[data-state="reading"] {
            border-color: #d4d4d8;
            box-shadow: 0 0 0 3px #f4f4f5;
        }
        .qcard[data-state="locked"] {
            border-color: var(--bad-bd);
            background: #fef9f9;
        }
        .qcard[data-state="revealed"] {
            background: var(--good-bg);
            border-color: var(--good-bd);
        }
        .qcard[data-state="dead"] {
            background: var(--warn-bg);
            border-color: var(--warn-bd);
        }

        .qcard-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-weight: 600;
            color: var(--ink-3);
            margin-bottom: 10px;
        }
        .qnum { color: var(--ink-2); font-family: var(--font-mono); font-size: 11px; }
        .qstate.reading  { color: var(--ink-2); }
        .qstate.locked   { color: var(--bad); }
        .qstate.revealed { color: var(--good); }
        .qstate.dead     { color: var(--warn); }

        .qbody {
            font-family: var(--font-read);
            font-size: 17px;
            line-height: 1.7;
            color: var(--ink);
        }
        .word-read   { color: var(--ink); }
        .word-unread { color: #d4d4d8; }

        .qresult {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px dashed var(--rule);
            display: flex;
            align-items: baseline;
            gap: 10px;
            flex-wrap: wrap;
            font-size: 13px;
        }
        .qresult .answer-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--ink-3);
            font-weight: 700;
        }
        .qresult .answer {
            font-weight: 600;
            font-size: 14px;
            color: var(--ink);
        }
        .qresult .winner-meta {
            margin-left: auto;
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--ink-2);
        }
        .qresult .winner-meta .who { color: var(--ink); }

        /* ── Action zone (fixed at bottom of main) ── */
        .action-zone {
            flex-shrink: 0;
            padding: 14px 28px 16px;
            border-top: 1px solid var(--rule);
            background: var(--bg);
        }
        .action-row {
            display: flex;
            gap: 10px;
            align-items: center;
            min-height: 42px;
        }
        .action-row .input { flex: 1; font-size: 15px; }
        .action-hint {
            font-size: 12px;
            color: var(--ink-3);
            font-family: var(--font-mono);
        }

        .timer-track {
            margin-top: 10px;
            height: 3px;
            background: var(--rule-2);
            border-radius: 2px;
            overflow: hidden;
        }
        .timer-fill {
            height: 100%;
            width: 0%;
            background: var(--warn);
            transition: width 100ms linear;
        }

        .waiting {
            font-size: 14px;
            color: var(--ink-2);
            padding: 8px 0;
            font-family: var(--font-ui);
        }
        .waiting .who { color: var(--ink); font-weight: 600; font-family: var(--font-mono); }

        /* ── Inputs ── */
        .input {
            background: var(--panel);
            border: 1px solid var(--rule);
            color: var(--ink);
            padding: 9px 12px;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: border-color 100ms;
        }
        .input:focus { border-color: var(--ink-2); }
        .input::placeholder { color: var(--ink-3); }

        /* ── Buttons ── */
        .btn {
            background: var(--panel);
            border: 1px solid var(--rule);
            color: var(--ink);
            padding: 9px 16px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            white-space: nowrap;
            transition: background 100ms, border-color 100ms;
        }
        .btn:hover { background: #f8f7f3; border-color: var(--ink-3); }
        .btn-primary {
            background: var(--accent);
            color: var(--accent-fg);
            border-color: var(--accent);
        }
        .btn-primary:hover { background: #000; }
        .btn-ghost {
            border-color: transparent;
            color: var(--ink-2);
            background: transparent;
        }
        .btn-ghost:hover { color: var(--ink); background: var(--rule-2); }
        .buzz-btn {
            flex: 1;
            padding: 11px;
            background: var(--accent);
            color: var(--accent-fg);
            border: 1px solid var(--accent);
            border-radius: 6px;
            font-weight: 600;
            font-size: 14px;
            font-family: inherit;
            cursor: pointer;
            letter-spacing: 0.02em;
            transition: background 80ms;
        }
        .buzz-btn:hover { background: #000; }
        .buzz-btn .kbd-hint {
            margin-left: 8px;
            font-weight: 400;
            font-size: 12px;
            opacity: 0.65;
        }

        /* ── Sidebar ── */
        aside {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .panel {
            padding: 18px 22px;
            border-bottom: 1px solid var(--rule);
        }
        .panel:last-child {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-bottom: none;
        }
        .panel-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 11px;
            color: var(--ink-3);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 700;
            margin-bottom: 12px;
        }
        .panel-title .count {
            font-family: var(--font-mono);
            font-size: 11px;
        }

        /* Players */
        .players-list { display: flex; flex-direction: column; gap: 6px; }
        .player-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 3px 0;
            font-size: 13px;
        }
        .player-name {
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--ink);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
        }
        .player-name.me::after {
            content: 'you';
            margin-left: 6px;
            font-size: 10px;
            color: var(--ink-3);
            font-family: var(--font-ui);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-weight: 600;
        }
        .player-score {
            font-family: var(--font-mono);
            font-size: 13px;
            font-weight: 600;
            color: var(--ink-2);
            margin-left: 12px;
        }
        .player-score.pos { color: var(--good); }
        .player-score.neg { color: var(--bad); }

        /* Activity */
        .activity-list {
            flex: 1;
            overflow-y: auto;
            margin: 0 -22px;
            padding: 0 22px;
        }
        .ev {
            padding: 8px 0;
            border-bottom: 1px solid var(--rule-2);
            font-size: 12px;
            line-height: 1.45;
            color: var(--ink-2);
        }
        .ev:last-child { border-bottom: none; }
        .ev-tag {
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--ink-3);
            display: inline-block;
            margin-right: 8px;
            min-width: 38px;
        }
        .ev .who { font-family: var(--font-mono); font-size: 12px; color: var(--ink); }
        .ev.correct .ev-tag { color: var(--good); }
        .ev.wrong   .ev-tag { color: var(--warn); }
        .ev.dead    .ev-tag { color: var(--warn); }
        .ev.lock    .ev-tag { color: var(--bad); }
        .ev.join    .ev-tag { color: var(--ink-3); }

        /* ── Footer hints ── */
        .hints {
            grid-column: 1 / -1;
            padding: 8px 28px;
            border-top: 1px solid var(--rule);
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 11px;
            color: var(--ink-3);
            flex-shrink: 0;
        }
        .hints .keys { display: flex; gap: 14px; }
        .hints .keys span { display: inline-flex; gap: 4px; align-items: center; }
        kbd {
            font-family: var(--font-mono);
            font-size: 10px;
            padding: 2px 5px;
            border-radius: 3px;
            background: var(--panel);
            border: 1px solid var(--rule);
            color: var(--ink-2);
            font-weight: 500;
        }
        .status {
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--ink-3);
        }

        .hidden { display: none !important; }

        @media (max-width: 900px) {
            .layout { grid-template-columns: 1fr; }
            aside { display: none; }
            .hints { grid-column: 1; }
        }
    </style>
</head>
<body>

<header>
    <span class="brand">qbowl<span class="dot">·</span>gen</span>
    <div class="header-right">
        <span class="online"><span class="online-dot"></span><span id="online-count">1</span> online</span>
        <span class="me" id="me-id">…</span>
        <button class="btn btn-ghost" id="reset-btn">Reset</button>
    </div>
</header>

<div class="layout">
    <main>
        <div class="topic-bar">
            <span class="label">Topic</span>
            <input id="topic-input" class="input" type="text" style="flex:1"
                   placeholder="ancient rome, jazz, linear algebra…">
            <button id="start-btn" class="btn btn-primary">Start round</button>
        </div>

        <div class="stream" id="stream">
            <div class="stream-empty" id="stream-empty">
                Pick a topic and start a round to begin.
            </div>
        </div>

        <div class="action-zone">
            <div class="action-row" id="action-row">
                <span class="action-hint" id="action-idle">Press <kbd>Enter</kbd> after typing a topic to begin.</span>
                <button id="buzz-btn" class="buzz-btn hidden">
                    Buzz<span class="kbd-hint">Space</span>
                </button>
                <span id="waiting" class="waiting hidden"></span>
                <input id="answer-input" type="text" class="input hidden"
                       placeholder="Your answer…" autocomplete="off">
                <button id="submit-btn" class="btn btn-primary hidden">Submit</button>
                <button id="next-btn" class="btn btn-primary hidden">Next question →</button>
            </div>
            <div id="timer-track" class="timer-track hidden">
                <div id="timer-fill" class="timer-fill"></div>
            </div>
        </div>
    </main>

    <aside>
        <div class="panel">
            <div class="panel-title">Players <span class="count" id="players-count">0</span></div>
            <div class="players-list" id="players-list"></div>
        </div>
        <div class="panel">
            <div class="panel-title">Activity</div>
            <div class="activity-list" id="activity"></div>
        </div>
    </aside>

    <div class="hints">
        <div class="keys">
            <span><kbd>Space</kbd> buzz</span>
            <span><kbd>N</kbd> next</span>
            <span><kbd>Enter</kbd> submit / start</span>
        </div>
        <span class="status" id="status">connecting…</span>
    </div>
</div>

<script>
"use strict";

// ── State ────────────────────────────────────────────────────────
// idle | loading | reading | locked | revealed
let state = 'idle';
let isBuzzer = false;
let timerInterval = null;
let currentCard = null;     // active question card element
let currentBody = null;     // its .qbody element
let currentWordsRead = 0;   // words received in current question
const players = new Map();  // id -> { score }

const clientId = (() => {
    let id = localStorage.getItem('qb_cid');
    if (!id) {
        id = 'p_' + Math.random().toString(36).slice(2, 7);
        localStorage.setItem('qb_cid', id);
    }
    return id;
})();

const $ = id => document.getElementById(id);
const els = {
    me: $('me-id'),
    onlineCount: $('online-count'),
    topic: $('topic-input'),
    startBtn: $('start-btn'),
    nextBtn: $('next-btn'),
    buzzBtn: $('buzz-btn'),
    waiting: $('waiting'),
    answer: $('answer-input'),
    submitBtn: $('submit-btn'),
    actionIdle: $('action-idle'),
    timerTrack: $('timer-track'),
    timerFill: $('timer-fill'),
    stream: $('stream'),
    streamEmpty: $('stream-empty'),
    playersCount: $('players-count'),
    playersList: $('players-list'),
    activity: $('activity'),
    resetBtn: $('reset-btn'),
    status: $('status'),
};
els.me.textContent = clientId;

// ── WebSocket ────────────────────────────────────────────────────
const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
const ws = new WebSocket(`${proto}//${location.host}/ws/${clientId}`);

ws.onopen  = () => setStatus('connected');
ws.onclose = () => setStatus('disconnected');

ws.onmessage = ({ data }) => {
    const msg = JSON.parse(data);

    switch (msg.type) {

    case 'status':
        setStatus(msg.text);
        break;

    case 'state_sync':
        if (msg.players) {
            msg.players.forEach(id => {
                if (!players.has(id)) players.set(id, { score: 0 });
            });
        }
        if (msg.scores) ingestScores(msg.scores);
        renderPlayers();
        // Late-join catch-up with active question
        if (msg.partial_clue) {
            state = msg.locked ? 'locked' : 'reading';
            currentCard = createQuestionCard(msg.question_number || '?');
            currentBody = currentCard.querySelector('.qbody');
            currentWordsRead = msg.words_read || 0;
            renderClueWords(msg.partial_clue.split(' '), 'word-read');
            if (msg.locked) {
                setCardState(currentCard, 'locked', `${msg.winner} answering`);
                setActionLocked(msg.winner);
            } else {
                setCardState(currentCard, 'reading', 'reading');
                setActionReading();
            }
            scrollStreamToBottom();
        }
        break;

    case 'question_start':
        // Server announces a new question is starting; create card now
        startNewQuestion(msg.question_number);
        break;

    case 'clue_chunk':
        if (state === 'idle') break;
        if (!currentCard) startNewQuestion(null);
        if (state !== 'reading') {
            state = 'reading';
            setCardState(currentCard, 'reading', 'reading');
            setActionReading();
        }
        appendWord(msg.text);
        currentWordsRead++;
        break;

    case 'lock':
        state = 'locked';
        isBuzzer = (msg.winner === clientId);
        if (currentCard) setCardState(currentCard, 'locked', `${esc(msg.winner)} answering`);
        setActionLocked(msg.winner);
        addEvent('lock', 'BUZZ', `<span class="who">${esc(msg.winner)}</span>`);
        setStatus(`${msg.winner} buzzed`);
        break;

    case 'wrong_buzz':
        // No feedback at all — just announce the fact.
        state = 'reading';
        isBuzzer = false;
        stopTimer();
        if (currentCard) setCardState(currentCard, 'reading', 'reading');
        setActionReading();
        addEvent('wrong', 'WRONG',
            `<span class="who">${esc(msg.guesser)}</span> said “${esc(msg.guess) || '—'}”`);
        if (msg.scores) ingestScores(msg.scores);
        setStatus('reading…');
        break;

    case 'reveal':
        state = 'revealed';
        isBuzzer = false;
        stopTimer();
        if (currentCard) {
            setCardState(currentCard, 'revealed', '✓ correct');
            renderReadUnread(msg.full_clue);
            attachResult(currentCard, 'revealed', msg.answer,
                `<span class="who">${esc(msg.winner)}</span> said “${esc(msg.guess)}” ✓`);
        }
        setActionRevealed();
        addEvent('correct', 'CORRECT',
            `<span class="who">${esc(msg.winner)}</span> · <strong>${esc(msg.answer)}</strong>`);
        if (msg.scores) ingestScores(msg.scores);
        setStatus(`✓ ${msg.answer}`);
        break;

    case 'question_dead':
        state = 'revealed';
        stopTimer();
        if (currentCard) {
            setCardState(currentCard, 'dead', '— dead');
            if (msg.full_clue) renderReadUnread(msg.full_clue);
            attachResult(currentCard, 'dead', msg.answer, 'no correct buzz');
        }
        setActionRevealed();
        addEvent('dead', 'DEAD', `<strong>${esc(msg.answer)}</strong>`);
        setStatus(`— ${msg.answer}`);
        break;

    case 'reset':
        resetUI();
        break;

    case 'player_joined':
        if (!players.has(msg.player)) players.set(msg.player, { score: 0 });
        renderPlayers();
        els.onlineCount.textContent = msg.count;
        if (msg.player !== clientId) {
            addEvent('join', 'JOIN', `<span class="who">${esc(msg.player)}</span>`);
        }
        break;

    case 'player_left':
        players.delete(msg.player);
        renderPlayers();
        els.onlineCount.textContent = msg.count;
        addEvent('join', 'LEAVE', `<span class="who">${esc(msg.player)}</span>`);
        break;

    case 'error':
        setStatus('error: ' + msg.message);
        if (state === 'reading' || state === 'loading') {
            state = 'idle';
            setActionIdle('Round complete. Pick a new topic to start another.');
        }
        break;
    }
};

// ── Question cards ───────────────────────────────────────────────
function startNewQuestion(qnum) {
    state = 'reading';
    currentCard = createQuestionCard(qnum);
    currentBody = currentCard.querySelector('.qbody');
    currentWordsRead = 0;
    setCardState(currentCard, 'reading', 'reading');
    setActionReading();
    scrollStreamToBottom();
}

function createQuestionCard(qnum) {
    els.streamEmpty.classList.add('hidden');
    const card = document.createElement('div');
    card.className = 'qcard';
    card.dataset.state = 'reading';
    card.innerHTML = `
        <div class="qcard-meta">
            <span class="qnum">Question ${qnum ?? '—'}</span>
            <span class="qstate reading">reading</span>
        </div>
        <div class="qbody"></div>
    `;
    els.stream.appendChild(card);
    return card;
}

function setCardState(card, stateName, label) {
    card.dataset.state = stateName;
    const stateEl = card.querySelector('.qstate');
    stateEl.className = 'qstate ' + stateName;
    stateEl.textContent = label;
}

function attachResult(card, kind, answer, metaHTML) {
    let res = card.querySelector('.qresult');
    if (!res) {
        res = document.createElement('div');
        res.className = 'qresult';
        card.appendChild(res);
    }
    res.innerHTML = `
        <span class="answer-label">Answer</span>
        <span class="answer">${esc(answer)}</span>
        <span class="winner-meta">${metaHTML}</span>
    `;
}

function appendWord(word) {
    if (!currentBody) return;
    const s = document.createElement('span');
    s.className = 'word-read';
    s.textContent = (currentBody.children.length ? ' ' : '') + word;
    currentBody.appendChild(s);
    scrollStreamToBottom();
}

function renderClueWords(words, cls) {
    if (!currentBody) return;
    currentBody.textContent = '';
    words.forEach((w, i) => {
        const s = document.createElement('span');
        s.className = cls;
        s.textContent = (i ? ' ' : '') + w;
        currentBody.appendChild(s);
    });
}

function renderReadUnread(fullClue) {
    if (!currentBody) return;
    const words = fullClue.split(' ');
    currentBody.textContent = '';
    words.forEach((w, i) => {
        const s = document.createElement('span');
        s.className = i < currentWordsRead ? 'word-read' : 'word-unread';
        s.textContent = (i ? ' ' : '') + w;
        currentBody.appendChild(s);
    });
}

function scrollStreamToBottom() {
    // Smart-scroll: only auto-scroll if user is already near the bottom.
    const distance = els.stream.scrollHeight - els.stream.scrollTop - els.stream.clientHeight;
    if (distance < 120) {
        els.stream.scrollTop = els.stream.scrollHeight;
    }
}

// ── Action zone ──────────────────────────────────────────────────
function hideAllAction() {
    els.actionIdle.classList.add('hidden');
    els.buzzBtn.classList.add('hidden');
    els.waiting.classList.add('hidden');
    els.answer.classList.add('hidden');
    els.submitBtn.classList.add('hidden');
    els.nextBtn.classList.add('hidden');
    els.timerTrack.classList.add('hidden');
}

function setActionIdle(text) {
    hideAllAction();
    els.actionIdle.textContent = text || 'Press Enter after typing a topic to begin.';
    els.actionIdle.classList.remove('hidden');
}

function setActionReading() {
    hideAllAction();
    els.buzzBtn.classList.remove('hidden');
}

function setActionLocked(winner) {
    hideAllAction();
    if (winner === clientId) {
        els.answer.classList.remove('hidden');
        els.submitBtn.classList.remove('hidden');
        els.timerTrack.classList.remove('hidden');
        els.answer.value = '';
        els.answer.focus();
        startTimer(10000);
    } else {
        els.waiting.innerHTML = `<span class="who">${esc(winner)}</span> is answering…`;
        els.waiting.classList.remove('hidden');
    }
}

function setActionRevealed() {
    hideAllAction();
    els.nextBtn.classList.remove('hidden');
}

// ── Players ──────────────────────────────────────────────────────
function ingestScores(scores) {
    Object.entries(scores).forEach(([id, sc]) => {
        if (players.has(id)) players.get(id).score = sc;
    });
    renderPlayers();
}

function renderPlayers() {
    els.playersCount.textContent = players.size;
    els.playersList.innerHTML = '';
    if (players.size === 0) {
        els.playersList.innerHTML = '<div style="color:var(--ink-3);font-size:12px;">no one yet</div>';
        return;
    }
    Array.from(players.entries())
        .sort((a, b) => b[1].score - a[1].score)
        .forEach(([id, { score }]) => {
            const row = document.createElement('div');
            row.className = 'player-row';
            const cls = score > 0 ? 'pos' : score < 0 ? 'neg' : '';
            const me = id === clientId ? ' me' : '';
            row.innerHTML = `
                <span class="player-name${me}">${esc(id)}</span>
                <span class="player-score ${cls}">${score > 0 ? '+' : ''}${score}</span>`;
            els.playersList.appendChild(row);
        });
}

// ── Activity ─────────────────────────────────────────────────────
function addEvent(kind, tag, html) {
    const el = document.createElement('div');
    el.className = 'ev ' + kind;
    el.innerHTML = `<span class="ev-tag">${tag}</span>${html}`;
    els.activity.insertBefore(el, els.activity.firstChild);
}

// ── Timer ────────────────────────────────────────────────────────
function startTimer(ms) {
    stopTimer();
    const t0 = Date.now();
    timerInterval = setInterval(() => {
        const pct = Math.min(((Date.now() - t0) / ms) * 100, 100);
        els.timerFill.style.width = pct + '%';
        if (pct >= 100) {
            stopTimer();
            ws.send(JSON.stringify({ type: 'submit_answer', guess: '' }));
        }
    }, 100);
}
function stopTimer() {
    clearInterval(timerInterval);
    timerInterval = null;
    els.timerFill.style.width = '0%';
}

// ── Misc helpers ─────────────────────────────────────────────────
function setStatus(text) { els.status.textContent = text; }

function esc(s) {
    return String(s ?? '').replace(/[&<>"']/g, c => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    })[c]);
}

// ── Game actions ─────────────────────────────────────────────────
function startGame() {
    const topic = els.topic.value.trim() || 'General Knowledge';
    ws.send(JSON.stringify({ type: 'start', topic }));
    state = 'loading';
    // Clear questions list for fresh round
    els.stream.innerHTML = '';
    els.stream.appendChild(els.streamEmpty);
    els.streamEmpty.textContent = 'Curating topics…';
    els.streamEmpty.classList.remove('hidden');
    currentCard = null;
    currentBody = null;
    currentWordsRead = 0;
    setActionIdle('Generating questions…');
    els.activity.innerHTML = '';
}

function goNext() {
    ws.send(JSON.stringify({ type: 'next' }));
    state = 'loading';
    currentCard = null;
    currentBody = null;
    currentWordsRead = 0;
    setActionIdle('Loading next question…');
}

function buzz() {
    if (state === 'reading') ws.send(JSON.stringify({ type: 'buzz' }));
}

function submitAnswer() {
    const guess = els.answer.value.trim();
    ws.send(JSON.stringify({ type: 'submit_answer', guess }));
    els.answer.value = '';
}

function resetUI() {
    state = 'idle';
    isBuzzer = false;
    currentCard = null;
    currentBody = null;
    currentWordsRead = 0;
    stopTimer();
    els.stream.innerHTML = '';
    els.stream.appendChild(els.streamEmpty);
    els.streamEmpty.textContent = 'Pick a topic and start a round to begin.';
    els.streamEmpty.classList.remove('hidden');
    els.activity.innerHTML = '';
    players.forEach(p => { p.score = 0; });
    renderPlayers();
    setActionIdle();
    setStatus('');
}

// ── Wire up ──────────────────────────────────────────────────────
els.startBtn.addEventListener('click', startGame);
els.nextBtn.addEventListener('click', goNext);
els.buzzBtn.addEventListener('click', buzz);
els.submitBtn.addEventListener('click', submitAnswer);
els.resetBtn.addEventListener('click', () => ws.send(JSON.stringify({ type: 'reset' })));

els.topic.addEventListener('keydown', e => { if (e.key === 'Enter') startGame(); });
els.answer.addEventListener('keydown', e => { if (e.key === 'Enter') submitAnswer(); });

window.addEventListener('keydown', e => {
    if (document.activeElement.tagName === 'INPUT') return;
    if (e.code === 'Space') { e.preventDefault(); buzz(); }
    if (e.key.toLowerCase() === 'n' && state === 'revealed') goNext();
});

// Initial: register self and show idle action
players.set(clientId, { score: 0 });
renderPlayers();
setActionIdle();
</script>
</body>
</html>
